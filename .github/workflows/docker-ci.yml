name: Product API CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./api/ProductApi/ProductApi.csproj

      - name: Build project
        run: dotnet build ./api/ProductApi/ProductApi.csproj --no-restore

      - name: Run tests (if any)
        run: echo "No tests yet"

      - name: Build Docker image
        run: docker build -t product-api:ci ./api/ProductApi

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}/product-api:latest ./api/ProductApi

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository }}/product-api:latest