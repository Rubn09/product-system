name: Product API CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./api/ProductApi/ProductApi.csproj

      - name: Build project
        run: dotnet build ./api/ProductApi/ProductApi.csproj --no-restore

      - name: Run tests (if any)
        run: echo "No tests yet"